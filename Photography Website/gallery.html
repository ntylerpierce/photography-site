<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Portfolio</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/gallery.css">
</head>
<body>
  <header class="nav">
    <a href="index.html" class="nav__logo" id="nav-logo">Portfolio</a>
    <ul class="nav__categories" id="nav-categories"></ul>
  </header>

  <div class="gallery-page">
    <div class="gallery-page__header">
      <h1 class="gallery-page__title" id="gallery-title"></h1>
    </div>
    <div class="grid" id="photo-grid"></div>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox__close" id="lb-close" aria-label="Close">&#215;</button>
    <button class="lightbox__prev" id="lb-prev" aria-label="Previous photo">&#8592;</button>
    <button class="lightbox__next" id="lb-next" aria-label="Next photo">&#8594;</button>
    <div class="lightbox__inner">
      <img class="lightbox__img" id="lb-img" src="" alt="">
      <div class="lightbox__caption">
        <div class="lightbox__caption-title" id="lb-title"></div>
        <div class="lightbox__caption-date" id="lb-date"></div>
      </div>
    </div>
  </div>

  <script src="scripts/categories.js"></script>
  <script src="scripts/gallery.js"></script>

  <noscript>
    <div style="position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Helvetica Neue',Arial,sans-serif;font-weight:200;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;text-align:center;padding:40px;">
      JavaScript is required to view this gallery.
    </div>
  </noscript>
</body>
</html>
